services:
  backend:
    image: ngchicuong8820/todolist-backend:${IMAGE_TAG:-latest}
    container_name: todolist-backend
    restart: unless-stopped
    environment:
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${DATABASE_NAME:-todolist_dev}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      PORT: 5000
      NODE_ENV: production
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - todolist-network

  frontend:
    image: ngchicuong8820/todolist-frontend:${IMAGE_TAG:-latest}
    container_name: todolist-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://${EC2_PUBLIC_IP}:5000/api
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - todolist-network

networks:
  todolist-network:
    driver: bridge