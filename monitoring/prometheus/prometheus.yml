global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']

  - job_name: 'todolist-backend'
    static_configs:
      - targets: ['10.0.1.43:5000']
    metrics_path: '/metrics'
    scrape_interval: 15s

  - job_name: 'db-ec2-node'
    static_configs:
      - targets: ['10.0.1.7:9100']
    scrape_interval: 15s